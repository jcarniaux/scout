name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "backend/**"
      - "frontend/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

# Only one deploy can run at a time. cancel-in-progress: false means a
# second push queues instead of cancelling, so no deploy is ever skipped.
concurrency:
  group: scout-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.12"
  TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

# ─── Job graph ────────────────────────────────────────────────────────────────
#
#   terraform ──┬──▶ frontend-deploy
#               └──┐
#   backend-test   ├──▶ backend-deploy
#                  ┘
#
# terraform and backend-test run in parallel.
# frontend-deploy only needs terraform (for pool IDs and bucket name).
# backend-deploy only starts when both terraform and backend-test succeed.
# Both deploy jobs skip on plan/destroy runs.

jobs:
  # ── 1. Infrastructure ────────────────────────────────────────────────────────
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'apply' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    outputs:
      api_url: ${{ steps.outputs.outputs.api_url }}
      user_pool_id: ${{ steps.outputs.outputs.user_pool_id }}
      user_pool_client_id: ${{ steps.outputs.outputs.user_pool_client_id }}
      frontend_bucket: ${{ steps.outputs.outputs.frontend_bucket }}
      cloudfront_id: ${{ steps.outputs.outputs.cloudfront_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          # GitHub runners use `bash -e` by default, which means the script exits
          # immediately if any command fails — before we can capture $?.
          # Disable errexit here so we can capture terraform's exit code ourselves
          # via PIPESTATUS[0], which gives the exit code of the first command in
          # the pipe (terraform), not the second (tee).
          set +e
          terraform plan \
            -out=tfplan \
            -detailed-exitcode \
            -no-color \
            2>&1 | tee plan-output.txt
          TF_EXIT=${PIPESTATUS[0]}
          echo "exit_code=$TF_EXIT" >> "$GITHUB_OUTPUT"
          # 0 = no changes, 2 = changes present — both produce a valid plan file.
          # 1 = error — fail the step so downstream steps never attempt to apply.
          [[ "$TF_EXIT" == "1" ]] && exit 1 || exit 0

      - name: Upload Plan
        if: github.event.inputs.action != 'destroy'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan

      - name: Terraform Apply
        if: >
          (github.event.inputs.action == 'apply') ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve

      - name: Export Outputs
        if: >
          (github.event.inputs.action == 'apply') ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        id: outputs
        run: |
          echo "api_url=$(terraform output -raw api_gateway_url)" >> "$GITHUB_OUTPUT"
          echo "user_pool_id=$(terraform output -raw cognito_user_pool_id)" >> "$GITHUB_OUTPUT"
          echo "user_pool_client_id=$(terraform output -raw cognito_user_pool_client_id)" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket=$(terraform output -raw frontend_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

  # ── 2. Backend Tests (parallel with terraform) ───────────────────────────────
  backend-test:
    name: Lint & Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov

      - name: Lint
        run: ruff check lambdas/

      - name: Syntax check
        run: |
          python - <<'EOF'
          import pathlib, sys
          errors = []
          for f in pathlib.Path('lambdas').rglob('*.py'):
              if f.name == '__init__.py':
                  continue
              try:
                  compile(f.read_text(), str(f), 'exec')
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print('All files pass syntax check')
          EOF

  # ── 3. Frontend Deploy (needs terraform for Cognito IDs + bucket name) ──────
  frontend-deploy:
    name: Build & Deploy Frontend
    needs: [terraform]
    runs-on: ubuntu-latest
    # Skip on plan-only or destroy runs.
    if: >
      github.ref == 'refs/heads/main' &&
      github.event.inputs.action != 'plan' &&
      github.event.inputs.action != 'destroy'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_USER_POOL_ID:     ${{ needs.terraform.outputs.user_pool_id }}
          VITE_USER_POOL_CLIENT_ID: ${{ needs.terraform.outputs.user_pool_client_id }}
          VITE_API_URL:          ${{ needs.terraform.outputs.api_url }}
        run: npm run build

      - name: Deploy to S3
        working-directory: frontend
        run: |
          BUCKET="${{ needs.terraform.outputs.frontend_bucket }}"
          echo "Syncing to s3://$BUCKET"
          # Long-lived assets (hashed filenames) — 1 year cache
          aws s3 sync dist/ "s3://$BUCKET" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          # index.html — no cache so browsers always get the latest entry point
          aws s3 cp dist/index.html "s3://$BUCKET/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"
          echo "✓ S3 sync complete"

      - name: Invalidate CloudFront
        run: |
          CF_ID="${{ needs.terraform.outputs.cloudfront_id }}"
          echo "Invalidating CloudFront distribution $CF_ID"
          aws cloudfront create-invalidation \
            --distribution-id "$CF_ID" \
            --paths "/*"
          echo "✓ CloudFront invalidation created"

  # ── 4. Backend Deploy (needs terraform + tests) ───────────────────────────────
  backend-deploy:
    name: Build & Deploy Lambdas
    needs: [terraform, backend-test]
    runs-on: ubuntu-latest
    # Skip on plan-only or destroy runs — there's nothing to deploy.
    if: >
      github.ref == 'refs/heads/main' &&
      github.event.inputs.action != 'plan' &&
      github.event.inputs.action != 'destroy'
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Lambda packages and layer
        run: |
          chmod +x build.sh
          # build.sh builds all code zips AND the dependency layer in one pass.
          # It runs pip without --quiet so failures are immediately visible,
          # and verifies jobspy is importable before zipping.
          ./build.sh
          echo "Layer zip size: $(du -sh build/dependencies-layer.zip | cut -f1)"

      - name: Publish Lambda layer via S3
        id: layer
        run: |
          # Lambda direct upload cap is 70 MB — use S3 to avoid RequestEntityTooLargeException
          S3_KEY="lambda-layers/scout-dependencies-$(date +%s).zip"
          aws s3 cp build/dependencies-layer.zip \
            s3://${{ secrets.S3_BUCKET_NAME }}/${S3_KEY} \
            --no-progress

          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name scout-dependencies \
            --content S3Bucket=${{ secrets.S3_BUCKET_NAME }},S3Key=${S3_KEY} \
            --compatible-runtimes python3.12 \
            --query 'LayerVersionArn' \
            --output text)

          # Clean up the layer zip from S3 — it's only needed during publish
          aws s3 rm s3://${{ secrets.S3_BUCKET_NAME }}/${S3_KEY}

          echo "layer_arn=$LAYER_ARN" >> "$GITHUB_OUTPUT"
          echo "Published layer: $LAYER_ARN"

      - name: Deploy crawler Lambdas
        run: |
          FUNCTIONS=(
            "scout-crawler-linkedin"
            "scout-crawler-indeed"
            "scout-crawler-glassdoor"
            "scout-crawler-ziprecruiter"
            "scout-crawler-dice"
          )
          for fn in "${FUNCTIONS[@]}"; do
            echo "Deploying $fn..."
            aws lambda wait function-updated --function-name "$fn"
            aws lambda update-function-code \
              --function-name "$fn" \
              --zip-file fileb://build/crawlers.zip \
              --publish > /dev/null
            aws lambda wait function-updated --function-name "$fn"
            aws lambda update-function-configuration \
              --function-name "$fn" \
              --layers "${{ steps.layer.outputs.layer_arn }}" > /dev/null
            aws lambda wait function-updated --function-name "$fn"
            echo "  ✓ $fn deployed"
          done

      - name: Deploy enrichment Lambda
        run: |
          aws lambda wait function-updated --function-name scout-enrichment
          aws lambda update-function-code \
            --function-name scout-enrichment \
            --zip-file fileb://build/enrichment.zip \
            --publish > /dev/null
          aws lambda wait function-updated --function-name scout-enrichment
          aws lambda update-function-configuration \
            --function-name scout-enrichment \
            --layers "${{ steps.layer.outputs.layer_arn }}" > /dev/null
          aws lambda wait function-updated --function-name scout-enrichment
          echo "✓ scout-enrichment deployed"

      - name: Deploy API Lambdas
        run: |
          FUNCTIONS=(
            "scout-api-get-jobs"
            "scout-api-update-status"
            "scout-api-user-settings"
          )
          for fn in "${FUNCTIONS[@]}"; do
            echo "Deploying $fn..."
            aws lambda wait function-updated --function-name "$fn"
            aws lambda update-function-code \
              --function-name "$fn" \
              --zip-file fileb://build/api.zip \
              --publish > /dev/null
            aws lambda wait function-updated --function-name "$fn"
            aws lambda update-function-configuration \
              --function-name "$fn" \
              --layers "${{ steps.layer.outputs.layer_arn }}" > /dev/null
            aws lambda wait function-updated --function-name "$fn"
            echo "  ✓ $fn deployed"
          done

      - name: Deploy report Lambdas
        run: |
          FUNCTIONS=(
            "scout-daily-report"
            "scout-weekly-report"
          )
          for fn in "${FUNCTIONS[@]}"; do
            echo "Deploying $fn..."
            aws lambda wait function-updated --function-name "$fn"
            aws lambda update-function-code \
              --function-name "$fn" \
              --zip-file fileb://build/reports.zip \
              --publish > /dev/null
            aws lambda wait function-updated --function-name "$fn"
            aws lambda update-function-configuration \
              --function-name "$fn" \
              --layers "${{ steps.layer.outputs.layer_arn }}" > /dev/null
            aws lambda wait function-updated --function-name "$fn"
            echo "  ✓ $fn deployed"
          done

      - name: Deploy purge Lambda
        run: |
          aws lambda wait function-updated --function-name scout-purge
          aws lambda update-function-code \
            --function-name scout-purge \
            --zip-file fileb://build/crawlers.zip \
            --publish > /dev/null
          aws lambda wait function-updated --function-name scout-purge
          aws lambda update-function-configuration \
            --function-name scout-purge \
            --layers "${{ steps.layer.outputs.layer_arn }}" > /dev/null
          aws lambda wait function-updated --function-name scout-purge
          echo "✓ scout-purge deployed"

      - name: Summary
        run: |
          echo "## Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- Layer: \`${{ steps.layer.outputs.layer_arn }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Packages: crawlers, enrichment, api, reports, purge" >> "$GITHUB_STEP_SUMMARY"
