name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'plan' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          set -o pipefail
          terraform plan \
            -out=tfplan \
            -detailed-exitcode \
            -no-color \
            2>&1 | tee plan-output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        # Exit codes: 0 = no changes, 1 = error, 2 = changes present
        # set -o pipefail propagates terraform's exit code through the pipe.
        # We treat codes 0 and 2 as success (plan produced a valid output file).
        continue-on-error: true

      - name: Check Plan Result
        run: |
          code="${{ steps.plan.outputs.exit_code }}"
          if [[ "$code" == "1" ]]; then
            echo "terraform plan failed — aborting"
            exit 1
          fi
          echo "Plan exit code: $code (0=no-changes, 2=changes-pending)"

      - name: Upload Plan
        if: steps.plan.outputs.exit_code != '1' && github.event.inputs.action != 'destroy'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan

      - name: Terraform Apply
        if: >
          steps.plan.outputs.exit_code != '1' &&
          (
            (github.event.inputs.action == 'apply') ||
            (github.event_name == 'push' && github.ref == 'refs/heads/main')
          )
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve

      - name: Export Outputs
        if: >
          (github.event.inputs.action == 'apply') ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        id: outputs
        run: |
          echo "api_url=$(terraform output -raw api_gateway_url)" >> "$GITHUB_OUTPUT"
          echo "user_pool_id=$(terraform output -raw cognito_user_pool_id)" >> "$GITHUB_OUTPUT"
          echo "user_pool_client_id=$(terraform output -raw cognito_user_pool_client_id)" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket=$(terraform output -raw frontend_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
